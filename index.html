<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vui Học Tiếng Việt</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Quicksand', sans-serif; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .hidden-view { display: none !important; }
    @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    .active-node { box-shadow: 0 0 0 0 rgba(245,158,11,0.7); animation: pulse-ring 1.5s infinite; }
    @keyframes pulse-ring { 100% { box-shadow: 0 0 0 15px rgba(245,158,11,0); } }
    .welcome-bg { background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%); position: relative; overflow: hidden; }
    .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.8; }
  </style>
</head>
<body class="bg-gradient-to-b from-[#e0f2fe] to-[#fef3c7] h-screen w-screen overflow-hidden flex flex-col items-center relative text-slate-800">

  <!-- ========================================== -->
  <!-- 1. MÀN HÌNH CHÀO                           -->
  <!-- ========================================== -->
  <div id="view-welcome" class="welcome-bg w-full h-full max-w-md flex flex-col items-center justify-center relative animate-pop z-50">
    <div class="cloud w-32 h-10 top-10 left-[-20px] blur-[2px]"></div>
    <div class="cloud w-40 h-12 top-24 right-[-30px] blur-[1px]"></div>
    
    <div class="w-32 h-32 bg-white rounded-full flex items-center justify-center text-6xl shadow-2xl mb-6 z-10 border-4 border-amber-300">🇻🇳</div>
    <h1 class="text-4xl font-extrabold text-white text-center drop-shadow-md mb-2 leading-tight">Vui Học<br>Tiếng Việt</h1>
    <p class="text-sky-100 font-bold text-lg mb-10 drop-shadow">Dành cho học sinh Tiểu học</p>
    
    <button onclick="app.enterMap()" class="z-10 bg-gradient-to-r from-amber-400 to-orange-500 text-white font-extrabold text-xl py-4 px-12 rounded-[2rem] shadow-xl active:scale-90 transition-transform border-b-4 border-orange-600">
      Bắt Đầu 🚀
    </button>
  </div>

  <!-- ========================================== -->
  <!-- 2. MÀN HÌNH BẢN ĐỒ                         -->
  <!-- ========================================== -->
  <div id="view-map" class="hidden-view w-full h-full max-w-md flex flex-col relative animate-pop">
    <header class="w-full p-4 z-10">
      <div class="bg-white/90 backdrop-blur-md rounded-2xl p-3 flex justify-between items-center shadow-md border-b-4 border-amber-200">
        <div class="flex items-center gap-3">
          <button onclick="app.showEvaluation()" class="w-12 h-12 rounded-full bg-amber-100 border-2 border-amber-400 flex items-center justify-center text-2xl shadow-inner active:scale-95">👦🏻</button>
          <div>
            <h2 class="text-[10px] text-amber-700 font-bold uppercase">Sĩ tử tí hon</h2>
            <p class="text-sm font-bold">Bé ngoan</p>
          </div>
        </div>
        <div class="bg-amber-100 border border-amber-300 rounded-full py-1 px-3 flex items-center gap-1">
          <span class="text-base">⭐</span><span class="text-sm font-bold text-amber-800" id="global-score">0</span>
        </div>
      </div>
    </header>

    <main class="flex-grow w-full relative flex flex-col items-center justify-center -mt-10">
      <svg class="absolute inset-0 w-full h-full pointer-events-none stroke-amber-400/50 stroke-[6] stroke-dasharray-[10,15]" fill="none" style="stroke-linecap: round;"><path d="M 200,100 Q 300,250 200,400 T 200,600" /></svg>
      <div class="relative w-full flex flex-col gap-20 items-center">
        <!-- Node Level 2 -->
        <div id="node-level-2" class="flex flex-col items-center translate-x-12 opacity-60 transition-all duration-500">
          <div id="node-lock-2" class="w-16 h-16 rounded-full bg-slate-300 border-4 border-slate-400 flex items-center justify-center text-2xl">🔒</div>
          <button id="node-btn-2" onclick="app.openSubLevelModal(2)" class="hidden w-20 h-20 rounded-full bg-gradient-to-br from-amber-400 to-orange-500 border-4 border-white flex items-center justify-center text-3xl shadow-xl active:scale-95">🏰</button>
          <div id="node-label-2" class="mt-2 bg-slate-400 text-white text-xs font-bold px-3 py-1 rounded-full shadow">Đỉnh Ca Dao</div>
          <div id="node-progress-2" class="text-[10px] font-bold text-slate-500 mt-1">0/5 bài</div>
        </div>

        <!-- Node Level 1 -->
        <div id="node-level-1" class="flex flex-col items-center -translate-x-10 relative transition-all duration-500">
          <button id="node-btn-1" onclick="app.openSubLevelModal(1)" class="w-20 h-20 rounded-full bg-gradient-to-br from-amber-400 to-orange-500 border-4 border-white flex items-center justify-center text-3xl shadow-xl active:scale-95 active-node">📚</button>
          <div id="node-label-1" class="mt-2 bg-orange-500 text-white text-xs font-bold px-4 py-1.5 rounded-full shadow">Luyện Từ Vựng</div>
          <div id="node-progress-1" class="text-[10px] font-bold text-orange-600 mt-1 bg-white/70 px-2 rounded-full">0/5 bài</div>
        </div>
      </div>
    </main>
  </div>

  <!-- MODAL CHỌN BÀI HỌC CON -->
  <div id="modal-sublevel" class="hidden-view fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-end justify-center">
    <div class="bg-white w-full max-w-md rounded-t-[2rem] p-6 shadow-2xl animate-pop pb-10">
      <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
        <h3 class="text-xl font-bold text-amber-600" id="sublevel-title">Danh sách Bài học</h3>
        <button onclick="document.getElementById('modal-sublevel').classList.add('hidden-view')" class="text-2xl text-slate-400 font-bold p-2 active:scale-90">✖</button>
      </div>
      <p class="text-sm font-bold text-slate-500 mb-4 bg-amber-50 p-2 rounded-lg border border-amber-100">📌 Hoàn thành ít nhất <span class="text-red-500">3/5 bài</span> để mở khóa bản đồ tiếp theo.</p>
      <div id="sublevel-list" class="flex flex-col gap-3 h-64 overflow-y-auto pr-2"></div>
    </div>
  </div>

  <!-- MODAL ĐÁNH GIÁ (AI HỒ SƠ BE) -->
  <div id="modal-eval" class="hidden-view fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-[2rem] p-6 shadow-2xl animate-pop">
      <div class="text-center mb-4">
        <div class="text-5xl mb-2">📊</div>
        <h3 class="text-xl font-bold text-sky-600">Báo Cáo Năng Lực</h3>
      </div>
      <div id="eval-content" class="bg-sky-50 rounded-xl p-4 text-sm text-slate-700 h-64 overflow-y-auto border border-sky-100 space-y-3"></div>
      <button onclick="document.getElementById('modal-eval').classList.add('hidden-view')" class="mt-4 w-full bg-sky-500 text-white font-bold py-3 rounded-2xl active:scale-95">Đóng Báo Cáo</button>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 3. MÀN HÌNH TRÒ CHƠI & KẾT QUẢ             -->
  <!-- ========================================== -->
  <div id="view-game" class="hidden-view w-full h-full max-w-md flex flex-col relative animate-pop bg-[#f0f9ff]">
    <div class="p-4 flex items-center justify-between">
      <button onclick="app.showMap()" class="w-10 h-10 bg-white rounded-full shadow flex items-center justify-center text-xl text-slate-600 active:scale-90">🔙</button>
      <div class="flex-grow mx-4 h-4 bg-slate-200 rounded-full overflow-hidden"><div id="progress-bar" class="h-full bg-emerald-400 w-0 transition-all"></div></div>
      <div class="font-bold text-slate-600 text-sm" id="progress-text">0/10</div>
    </div>
    
    <div class="flex-grow flex flex-col justify-center items-center p-6 w-full">
      <p id="game-prompt" class="text-slate-500 font-bold mb-4 text-sm bg-white px-4 py-1 rounded-full shadow-sm text-center">Câu hỏi?</p>
      <div id="word-card" class="w-full max-w-[280px] aspect-square bg-white rounded-[2.5rem] shadow-2xl border-8 border-sky-300 flex flex-col items-center justify-center relative transition-transform">
        <h1 id="current-word" class="text-3xl font-extrabold text-slate-800 tracking-tight text-center px-4 leading-relaxed">Từ Vựng</h1>
        <button onclick="app.readWord()" class="absolute bottom-4 bg-sky-100 text-sky-600 px-4 py-2 rounded-full text-sm font-bold active:bg-sky-200 flex items-center gap-2">
          <span>🔊</span> Nghe đọc
        </button>
      </div>
    </div>
    
    <div class="w-full p-6 grid grid-cols-2 gap-4 pb-10">
      <button onclick="app.checkAnswer('left')" class="h-24 bg-gradient-to-b from-emerald-100 to-emerald-200 border-b-4 border-emerald-400 rounded-2xl flex flex-col items-center justify-center shadow-lg active:scale-95 active:border-b-0 active:translate-y-1 transition-all">
        <span id="btn-left-text" class="font-bold text-emerald-800 px-2 text-center text-sm md:text-base">TRÁI</span>
      </button>
      <button onclick="app.checkAnswer('right')" class="h-24 bg-gradient-to-b from-amber-100 to-amber-200 border-b-4 border-amber-400 rounded-2xl flex flex-col items-center justify-center shadow-lg active:scale-95 active:border-b-0 active:translate-y-1 transition-all">
        <span id="btn-right-text" class="font-bold text-amber-800 px-2 text-center text-sm md:text-base">PHẢI</span>
      </button>
    </div>
  </div>

  <div id="view-result" class="hidden-view fixed inset-0 w-full h-full bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl flex flex-col items-center text-center animate-pop">
      <div class="text-6xl mb-2">🎉</div>
      <h2 class="text-2xl font-extrabold text-amber-500 mb-2">Hoàn thành bài!</h2>
      <p class="text-slate-600 font-bold mb-4">Bé nhận được <span class="text-amber-500">+50 ⭐</span></p>
      <button onclick="app.finishGame()" class="w-full bg-gradient-to-r from-amber-400 to-orange-500 text-white font-bold py-4 rounded-2xl active:scale-95 text-lg shadow-lg">Quay về Bản Đồ</button>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- KỊCH BẢN LOGIC ĐÃ FIX BUG                  -->
  <!-- ========================================== -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail', err));
      });
    }

    const AudioEngine = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      playTone(freq, type, duration) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = type; osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
      },
      playCorrect() { this.playTone(600, 'sine', 0.1); setTimeout(() => this.playTone(800, 'sine', 0.2), 100); },
      playWrong() { this.playTone(300, 'sawtooth', 0.3); }
    };

    const app = {
      db: null,
      stats: { score: 0, unlockedLevel: 1, completedGames: {}, errorLog: {} },
      currentGameId: null,
      currentSkill: null,
      currentQuestions: [],
      currentIndex: 0,
      
      async init() {
        try {
          const res = await fetch('./database.json');
          this.db = await res.json();
        } catch (e) {
          alert("Lỗi tải dữ liệu. Vui lòng kiểm tra file database.json!"); return;
        }

        const savedStats = localStorage.getItem('tv_stats');
        if(savedStats) {
          this.stats = JSON.parse(savedStats);
          document.getElementById('view-welcome').classList.add('hidden-view');
          document.getElementById('view-map').classList.remove('hidden-view');
        } else {
          document.getElementById('view-welcome').classList.remove('hidden-view');
          document.getElementById('view-map').classList.add('hidden-view');
        }

        this.updateMapUI();
        window.addEventListener('touchstart', () => { if (AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume(); }, { once: true });
      },

      saveStats() {
        localStorage.setItem('tv_stats', JSON.stringify(this.stats));
        this.updateMapUI();
      },

      enterMap() {
        document.getElementById('view-welcome').classList.add('hidden-view');
        document.getElementById('view-map').classList.remove('hidden-view');
      },

      showMap() {
        document.getElementById('view-game').classList.add('hidden-view');
        document.getElementById('view-result').classList.add('hidden-view');
        document.getElementById('view-map').classList.remove('hidden-view');
      },

      updateMapUI() {
        document.getElementById('global-score').innerText = this.stats.score;
        
        for (let lvlId in this.db.levels) {
          const levelData = this.db.levels[lvlId];
          const gamesInLevel = levelData.games;
          
          let passedCount = 0;
          gamesInLevel.forEach(g => { if(this.stats.completedGames[g.id]) passedCount++; });
          
          const progressEl = document.getElementById(`node-progress-${lvlId}`);
          if(progressEl) progressEl.innerText = `${passedCount}/${gamesInLevel.length} bài`;

          const node = document.getElementById(`node-level-${lvlId}`);
          const btn = document.getElementById(`node-btn-${lvlId}`);
          const lock = document.getElementById(`node-lock-${lvlId}`);
          const label = document.getElementById(`node-label-${lvlId}`);
          
          if (parseInt(lvlId) <= this.stats.unlockedLevel) {
            if(node) node.classList.remove('opacity-60');
            if(lock) lock.classList.add('hidden');
            if(btn) btn.classList.remove('hidden');
            if(label) label.className = "mt-2 bg-orange-500 text-white text-xs font-bold px-4 py-1.5 rounded-full";
            
            if (passedCount >= 3 && this.stats.unlockedLevel == lvlId) {
              this.stats.unlockedLevel = parseInt(lvlId) + 1;
              this.saveStats();
            }
          }
        }
      },

      openSubLevelModal(levelId) {
        if(levelId > this.stats.unlockedLevel) return;
        
        const levelData = this.db.levels[levelId];
        document.getElementById('sublevel-title').innerText = levelData.name;
        
        const listEl = document.getElementById('sublevel-list');
        listEl.innerHTML = '';
        
        levelData.games.forEach(game => {
          const isDone = this.stats.completedGames[game.id];
          const btnHtml = `
            <button onclick="app.startGame('${game.id}')" class="w-full flex items-center justify-between p-3 rounded-xl border-2 ${isDone ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200 hover:border-amber-300'} active:scale-95 transition-all text-left">
              <div>
                <div class="font-bold ${isDone ? 'text-emerald-700' : 'text-slate-700'}">${game.title}</div>
              </div>
              <div class="text-2xl">${isDone ? '✅' : '▶️'}</div>
            </button>
          `;
          listEl.innerHTML += btnHtml;
        });

        document.getElementById('modal-sublevel').classList.remove('hidden-view');
      },

      // FIX BUG: XỬ LÝ LỖI NULL DATA VÀ ĐIỀU HƯỚNG GIAO DIỆN
      startGame(gameId) {
        // 1. Tắt Modal trước
        document.getElementById('modal-sublevel').classList.add('hidden-view');
        
        // 2. Trích xuất dữ liệu câu hỏi từ CSDL
        this.currentGameId = gameId;
        this.currentQuestions = this.db.questions.filter(q => q.game_id === gameId).slice(0, 10);
        
        // CƠ CHẾ FAIL-SAFE: Nếu JSON chưa có câu hỏi nào cho Game ID này
        if (this.currentQuestions.length === 0) {
            alert("Nội dung bài học này đang được cập nhật thêm dữ liệu. Bạn hãy chọn bài khác nhé!");
            return; // Dừng chạy, giữ nguyên màn hình bản đồ
        }
        
        // 3. Tìm config của game để lấy nút bấm
        let gameConfig = null;
        Object.values(this.db.levels).forEach(lvl => {
          const found = lvl.games.find(g => g.id === gameId);
          if(found) gameConfig = found;
        });
        
        if (!gameConfig) return;

        this.currentSkill = gameConfig.skill;
        document.getElementById('game-prompt').innerText = gameConfig.type === 'classification' ? 'Phân loại từ' : 'Điền vào chỗ trống';
        
        // 4. Chuyển đổi màn hình một cách an toàn (Sử dụng DOM Element chuẩn)
        document.getElementById('view-map').classList.add('hidden-view');
        document.getElementById('view-game').classList.remove('hidden-view');
        
        this.currentIndex = 0;
        this.updateGameUI(gameConfig);
      },

      updateGameUI(gameConfig) {
        const item = this.currentQuestions[this.currentIndex];
        document.getElementById('current-word').innerText = item.word;
        
        document.getElementById('btn-left-text').innerText = item.btnLeft || gameConfig.btnLeft || 'TRÁI';
        document.getElementById('btn-right-text').innerText = item.btnRight || gameConfig.btnRight || 'PHẢI';

        const percent = ((this.currentIndex) / this.currentQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-text').innerText = `${this.currentIndex + 1}/${this.currentQuestions.length}`;
        
        const card = document.getElementById('word-card');
        card.classList.remove('animate-pop');
        void card.offsetWidth; 
        card.classList.add('animate-pop');
        
        setTimeout(() => this.readWord(item.word), 300);
      },

      checkAnswer(userChoice) {
        const item = this.currentQuestions[this.currentIndex];
        
        if (userChoice === item.correct) {
          AudioEngine.playCorrect();
          this.currentIndex++;
          
          if (this.currentIndex < this.currentQuestions.length) {
            let gameConfig;
            Object.values(this.db.levels).forEach(lvl => {
              const found = lvl.games.find(g => g.id === this.currentGameId);
              if(found) gameConfig = found;
            });
            this.updateGameUI(gameConfig);
          } else {
            this.stats.completedGames[this.currentGameId] = true;
            this.stats.score += 50;
            this.saveStats();
            
            document.getElementById('view-game').classList.add('hidden-view');
            document.getElementById('view-result').classList.remove('hidden-view');
            AudioEngine.playCorrect();
          }
        } else {
          AudioEngine.playWrong();
          
          if(!this.stats.errorLog[this.currentSkill]) this.stats.errorLog[this.currentSkill] = 0;
          this.stats.errorLog[this.currentSkill]++;
          this.saveStats();

          const card = document.getElementById('word-card');
          card.classList.remove('animate-pop');
          void card.offsetWidth; 
          card.classList.add('animate-shake', 'border-red-400');
          setTimeout(() => card.classList.remove('animate-shake', 'border-red-400'), 300);
        }
      },

      readWord(wordText) {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(wordText);
          utterance.lang = 'vi-VN';
          window.speechSynthesis.speak(utterance);
        }
      },

      finishGame() {
        this.showMap();
      },

      showEvaluation() {
        const evalBox = document.getElementById('eval-content');
        evalBox.innerHTML = '';
        
        let hasErrors = false;
        
        for (let skill in this.stats.errorLog) {
          const errCount = this.stats.errorLog[skill];
          if (errCount > 2) {
            hasErrors = true;
            const recText = this.db.recommendations[skill] || "Bé cần luyện tập thêm phần này nhé.";
            evalBox.innerHTML += `
              <div class="bg-white p-3 rounded-lg border-l-4 border-orange-400 shadow-sm">
                <span class="font-bold text-orange-600">⚠️ Chủ đề: ${skill.toUpperCase()}</span>
                <p class="mt-1">${recText}</p>
                <p class="text-xs text-slate-400 mt-1 font-bold">Số lần trả lời sai: ${errCount}</p>
              </div>
            `;
          }
        }

        if(!hasErrors) {
          evalBox.innerHTML = `
            <div class="flex flex-col items-center justify-center h-full text-center">
              <span class="text-4xl mb-2">🌟</span>
              <p class="font-bold text-emerald-600 mt-2">Tuyệt vời! Bé chưa có điểm yếu nào đáng lo ngại. Hãy tiếp tục phát huy nhé!</p>
            </div>
          `;
        }

        document.getElementById('modal-eval').classList.remove('hidden-view');
      }
    };

    // Khởi chạy ứng dụng
    app.init();
  </script>
</body>
</html>
