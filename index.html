<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vui Học Tiếng Việt</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Quicksand', sans-serif; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .hidden-view { display: none !important; }
    @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    /* Nền welcome */
    .welcome-bg { background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%); position: relative; overflow: hidden; }
    .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.8; }
    /* Nút bài học */
    .lesson-btn { transition: all 0.2s; }
    .lesson-btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-gradient-to-b from-[#f0f9ff] to-[#e0f2fe] h-screen w-screen overflow-hidden flex flex-col items-center relative text-slate-800">

  <!-- ========================================== -->
  <!-- 1. MÀN HÌNH CHÀO (WELCOME)                 -->
  <!-- ========================================== -->
  <div id="view-welcome" class="welcome-bg w-full h-full max-w-md flex flex-col items-center justify-center relative animate-pop z-50">
    <div class="cloud w-32 h-10 top-10 left-[-20px] blur-[2px]"></div>
    <div class="cloud w-40 h-12 top-24 right-[-30px] blur-[1px]"></div>
    <div class="cloud w-24 h-8 bottom-32 left-10 blur-[1px]"></div>
    
    <div class="w-32 h-32 bg-white rounded-full flex items-center justify-center text-6xl shadow-2xl mb-6 z-10 border-4 border-amber-300">📚</div>
    <h1 class="text-4xl font-extrabold text-white text-center drop-shadow-md mb-2 leading-tight">Vui Học<br>Tiếng Việt</h1>
    <p class="text-sky-100 font-bold text-lg mb-10 drop-shadow">Chương trình Tiểu học</p>
    
    <button onclick="app.enterDashboard()" class="z-10 bg-gradient-to-r from-amber-400 to-orange-500 text-white font-extrabold text-xl py-4 px-12 rounded-[2rem] shadow-xl active:scale-90 transition-transform border-b-4 border-orange-600 flex items-center gap-2">
      Bắt Đầu Học 🚀
    </button>
  </div>

  <!-- ========================================== -->
  <!-- 2. MÀN HÌNH CHÍNH (DASHBOARD CATEGORIES)  -->
  <!-- ========================================== -->
  <div id="view-dashboard" class="hidden-view w-full h-full max-w-md flex flex-col animate-pop bg-[#f8fafc]">
    
    <!-- Header -->
    <header class="bg-white px-5 pt-6 pb-4 shadow-sm rounded-b-3xl flex justify-between items-center z-10">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-sky-100 rounded-full flex items-center justify-center text-2xl border-2 border-sky-300">👦🏻</div>
        <div>
          <h2 class="text-sm font-bold text-slate-700">Chào Sĩ tử nhí,</h2>
          <p class="text-[11px] text-slate-400 font-bold">Hôm nay học gì nào?</p>
        </div>
      </div>
      <div class="bg-amber-100 border border-amber-300 rounded-full py-1.5 px-3 flex items-center gap-1 shadow-sm">
        <span>⭐</span><span class="text-sm font-bold text-amber-800" id="global-score">0</span>
      </div>
    </header>

    <!-- Danh sách Danh mục chính -->
    <main class="flex-grow overflow-y-auto p-5 pb-24">
      <h3 class="text-lg font-extrabold text-slate-700 mb-4">Các Nội Dung Chính</h3>
      <div id="category-list" class="grid grid-cols-1 gap-4">
        <!-- Render bằng JS -->
      </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="absolute bottom-0 w-full max-w-md bg-white border-t border-slate-200 px-6 py-3 flex justify-between items-center pb-safe">
      <button onclick="app.showDashboard()" class="flex flex-col items-center text-sky-500">
        <span class="text-2xl">🏠</span><span class="text-[10px] font-bold mt-1">Trang chủ</span>
      </button>
      <button onclick="app.showEvaluation()" class="flex flex-col items-center text-slate-400 hover:text-sky-500 transition-colors">
        <span class="text-2xl">📊</span><span class="text-[10px] font-bold mt-1">Đánh giá</span>
      </button>
    </nav>
  </div>

  <!-- ========================================== -->
  <!-- 3. MÀN HÌNH DANH SÁCH CHỦ ĐỀ & BÀI HỌC     -->
  <!-- ========================================== -->
  <div id="view-subcategories" class="hidden-view w-full h-full max-w-md flex flex-col animate-pop bg-[#f0f9ff]">
    <header class="bg-white px-4 py-4 shadow-sm flex items-center gap-3 z-10">
      <button onclick="app.showDashboard()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-xl active:bg-slate-200">🔙</button>
      <h2 class="text-lg font-extrabold text-slate-700" id="sub-cat-title">Tên Danh Mục</h2>
    </header>
    <main class="flex-grow overflow-y-auto p-4">
      <div id="subcategory-list" class="flex flex-col gap-6 pb-10">
        <!-- Render chủ đề và 15 bài học bằng JS -->
      </div>
    </main>
  </div>

  <!-- ========================================== -->
  <!-- 4. MÀN HÌNH TRÒ CHƠI (GAMEPLAY)            -->
  <!-- ========================================== -->
  <div id="view-game" class="hidden-view w-full h-full max-w-md flex flex-col relative animate-pop bg-[#f0f9ff]">
    <div class="p-4 flex items-center justify-between">
      <button onclick="app.backToSubcategories()" class="w-10 h-10 bg-white rounded-full shadow flex items-center justify-center text-xl text-slate-600 active:scale-90">✖</button>
      <div class="flex-grow mx-4 h-4 bg-slate-200 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-emerald-400 w-0 transition-all duration-300"></div>
      </div>
      <div class="font-bold text-slate-600 text-sm" id="progress-text">0/10</div>
    </div>
    
    <div class="flex-grow flex flex-col justify-center items-center p-6 w-full">
      <p id="game-prompt" class="text-slate-500 font-bold mb-4 text-sm bg-white px-4 py-1 rounded-full shadow-sm text-center">Câu hỏi?</p>
      <div id="word-card" class="w-full max-w-[280px] aspect-square bg-white rounded-[2.5rem] shadow-2xl border-8 border-sky-300 flex flex-col items-center justify-center relative transition-transform">
        <h1 id="current-word" class="text-3xl font-extrabold text-slate-800 tracking-tight text-center px-4 leading-relaxed">Từ Vựng</h1>
        <button onclick="app.readWord()" class="absolute bottom-4 bg-sky-100 text-sky-600 px-4 py-2 rounded-full text-sm font-bold active:bg-sky-200 flex items-center gap-2">
          <span>🔊</span> Nghe đọc
        </button>
      </div>
    </div>
    
    <div class="w-full p-6 grid grid-cols-2 gap-4 pb-10">
      <button onclick="app.checkAnswer('left')" class="h-24 bg-gradient-to-b from-emerald-100 to-emerald-200 border-b-4 border-emerald-400 rounded-2xl flex flex-col items-center justify-center shadow-lg active:scale-95 active:border-b-0 active:translate-y-1 transition-all">
        <span id="btn-left-text" class="font-bold text-emerald-800 px-2 text-center text-sm md:text-base">TRÁI</span>
      </button>
      <button onclick="app.checkAnswer('right')" class="h-24 bg-gradient-to-b from-amber-100 to-amber-200 border-b-4 border-amber-400 rounded-2xl flex flex-col items-center justify-center shadow-lg active:scale-95 active:border-b-0 active:translate-y-1 transition-all">
        <span id="btn-right-text" class="font-bold text-amber-800 px-2 text-center text-sm md:text-base">PHẢI</span>
      </button>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 5. MÀN HÌNH HOÀN THÀNH BÀI                 -->
  <!-- ========================================== -->
  <div id="view-result" class="hidden-view fixed inset-0 w-full h-full bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl flex flex-col items-center text-center animate-pop">
      <div class="text-6xl mb-2">🎉</div>
      <h2 class="text-2xl font-extrabold text-amber-500 mb-2">Hoàn thành bài!</h2>
      <p class="text-slate-600 font-bold mb-4">Bé nhận được <span class="text-amber-500">+50 ⭐</span></p>
      
      <!-- Bảng giải nghĩa rút gọn -->
      <div class="w-full bg-amber-50 rounded-xl p-4 text-left max-h-48 overflow-y-auto mb-6 border border-amber-100 text-sm">
        <h3 class="font-bold text-amber-800 mb-2 border-b border-amber-200 pb-1">Ghi nhớ nhanh:</h3>
        <ul id="summary-list" class="space-y-2 text-slate-700"></ul>
      </div>

      <button onclick="app.backToSubcategories()" class="w-full bg-gradient-to-r from-amber-400 to-orange-500 text-white font-bold py-4 rounded-2xl active:scale-95 text-lg shadow-lg">Tiếp tục học</button>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- MODAL ĐÁNH GIÁ (AI HỒ SƠ BE)               -->
  <!-- ========================================== -->
  <div id="modal-eval" class="hidden-view fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-[2rem] p-6 shadow-2xl animate-pop">
      <div class="text-center mb-4">
        <div class="text-5xl mb-2">📊</div>
        <h3 class="text-xl font-bold text-sky-600">Báo Cáo Năng Lực</h3>
      </div>
      <div id="eval-content" class="bg-sky-50 rounded-xl p-4 text-sm text-slate-700 h-64 overflow-y-auto border border-sky-100 space-y-3"></div>
      <button onclick="document.getElementById('modal-eval').classList.add('hidden-view')" class="mt-4 w-full bg-sky-500 text-white font-bold py-3 rounded-2xl active:scale-95">Đóng</button>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- KỊCH BẢN LOGIC ĐÃ ĐƯỢC XÂY DỰNG LẠI        -->
  <!-- ========================================== -->
  <script>
    // 1. Dữ liệu mặc định (Bọc lỗi an toàn nếu database.json không tồn tại)
    const fallbackDB = {
      categories: [
        {
          id: "cat_tuvung", name: "Luyện Từ Vựng", icon: "📚", color: "from-blue-400 to-blue-500",
          subcategories: [
            { id: "sub_tughep", name: "Phân Biệt Từ Ghép", skill: "tu_ghep", lessons: 15, type: "classification", btnLeft: "TỪ GHÉP", btnRight: "TỪ LÁY", prompt: "Đây là Từ Ghép hay Từ Láy?" },
            { id: "sub_tulay", name: "Phân Biệt Từ Láy", skill: "tu_lay", lessons: 15, type: "classification", btnLeft: "TỪ LÁY", btnRight: "TỪ KHÁC", prompt: "Đây là Từ Láy hay không?" },
            { id: "sub_dongnghia", name: "Từ Đồng Nghĩa", skill: "dong_nghia", lessons: 10, type: "classification", btnLeft: "ĐỒNG NGHĨA", btnRight: "TRÁI NGHĨA", prompt: "Hai từ này Đồng nghĩa hay Trái nghĩa?" },
            { id: "sub_trainghia", name: "Từ Trái Nghĩa", skill: "trai_nghia", lessons: 10, type: "classification", btnLeft: "TRÁI NGHĨA", btnRight: "ĐỒNG NGHĨA", prompt: "Hai từ này Trái nghĩa hay Đồng nghĩa?" },
            { id: "sub_tonghop", name: "Ôn Tập Tổng Hợp", skill: "tong_hop", lessons: 15, type: "classification", btnLeft: "TỪ GHÉP", btnRight: "TỪ LÁY", prompt: "Phân loại từ phức sau:" }
          ]
        },
        {
          id: "cat_cadao", name: "Ca Dao Tục Ngữ", icon: "🌾", color: "from-emerald-400 to-green-500",
          subcategories: [
            { id: "sub_cd_gd", name: "Chủ đề Gia Đình", skill: "ca_dao_gd", lessons: 10, type: "quiz", prompt: "Điền vào chỗ trống:" },
            { id: "sub_tn_daoly", name: "Đạo Lý Làm Người", skill: "tuc_ngu", lessons: 10, type: "quiz", prompt: "Điền vào chỗ trống:" }
          ]
        }
      ],
      questions: [
        // Một vài dữ liệu mẫu để chống sập web
        { skill: "tu_ghep", word: "nhà cửa", correct: "left", desc: "Hai từ có nghĩa ghép lại." },
        { skill: "tu_ghep", word: "long lanh", correct: "right", desc: "Đây là từ láy." },
        { skill: "tu_lay", word: "rầm rập", correct: "left", desc: "Láy toàn bộ âm." },
        { skill: "tu_lay", word: "sách vở", correct: "right", desc: "Đây là từ ghép." },
        { skill: "ca_dao_gd", word: "Công cha như núi...", correct: "left", btnLeft: "Thái Sơn", btnRight: "biển rộng", desc: "Ca ngợi công lao to lớn của cha." }
      ],
      recommendations: {
        "tu_ghep": "Bé cần nhớ Từ ghép là 2 tiếng đứng riêng đều phải có ý nghĩa nhé.",
        "tu_lay": "Bé hay nhầm Từ láy. Mẹo: Thử tách 2 từ ra xem có từ nào vô nghĩa không.",
        "dong_nghia": "Bé cần trau dồi thêm vốn từ đồng nghĩa bằng cách đọc nhiều sách truyện hơn."
      }
    };

    // 2. Audio Engine
    const AudioEngine = {
      ctx: new (window.AudioContext || window.webkitAudioContext)(),
      playTone(freq, type, duration) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = type; osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
      },
      playCorrect() { this.playTone(600, 'sine', 0.1); setTimeout(() => this.playTone(800, 'sine', 0.2), 100); },
      playWrong() { this.playTone(300, 'sawtooth', 0.3); }
    };

    // 3. Main App Logic
    const app = {
      db: null,
      stats: { score: 0, completedLessons: {}, errorLog: {} },
      
      currentCatId: null,
      currentSubConfig: null,
      currentLessonNumber: 1,
      currentQuestions: [],
      currentIndex: 0,
      
      async init() {
        // Cố gắng tải file dữ liệu ngoài, nếu lỗi thì xài dữ liệu nội bộ
        try {
          const res = await fetch('./database.json');
          const data = await res.json();
          this.db = data.categories ? data : fallbackDB;
        } catch (e) {
          console.warn("Dùng dữ liệu dự phòng vì không tìm thấy database.json");
          this.db = fallbackDB;
        }

        const savedStats = localStorage.getItem('tv_stats_v2');
        if(savedStats) {
          this.stats = JSON.parse(savedStats);
          this.showDashboard();
        } else {
          document.getElementById('view-welcome').classList.remove('hidden-view');
        }

        window.addEventListener('touchstart', () => { if (AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume(); }, { once: true });
      },

      saveStats() {
        localStorage.setItem('tv_stats_v2', JSON.stringify(this.stats));
        document.getElementById('global-score').innerText = this.stats.score;
      },

      // --- ĐIỀU HƯỚNG GIAO DIỆN ---
      hideAll() {
        ['view-welcome', 'view-dashboard', 'view-subcategories', 'view-game', 'view-result', 'modal-eval'].forEach(id => {
          document.getElementById(id).classList.add('hidden-view');
        });
      },

      enterDashboard() {
        this.showDashboard();
      },

      showDashboard() {
        this.hideAll();
        document.getElementById('view-dashboard').classList.remove('hidden-view');
        document.getElementById('global-score').innerText = this.stats.score;
        this.renderCategories();
      },

      // Render danh sách Danh mục chính
      renderCategories() {
        const list = document.getElementById('category-list');
        list.innerHTML = '';
        this.db.categories.forEach(cat => {
          list.innerHTML += `
            <div onclick="app.openCategory('${cat.id}')" class="bg-white rounded-[2rem] p-5 shadow-sm border border-slate-100 flex items-center gap-4 active:scale-95 transition-transform cursor-pointer">
              <div class="w-16 h-16 rounded-2xl bg-gradient-to-br ${cat.color} flex items-center justify-center text-3xl shadow-inner text-white">
                ${cat.icon}
              </div>
              <div class="flex-grow">
                <h3 class="text-xl font-extrabold text-slate-700">${cat.name}</h3>
                <p class="text-xs font-bold text-slate-400 mt-1">${cat.subcategories.length} Chủ đề ôn luyện</p>
              </div>
              <div class="text-slate-300 font-bold text-2xl">➔</div>
            </div>
          `;
        });
      },

      openCategory(catId) {
        this.currentCatId = catId;
        const cat = this.db.categories.find(c => c.id === catId);
        document.getElementById('sub-cat-title').innerText = cat.name;
        
        const list = document.getElementById('subcategory-list');
        list.innerHTML = '';
        
        cat.subcategories.forEach(sub => {
          let lessonButtonsHtml = '';
          // Khởi tạo nút cho 15 bài học (hoặc tùy cấu hình)
          for(let i = 1; i <= sub.lessons; i++) {
            const lessonKey = `${sub.id}_bai${i}`;
            const isDone = this.stats.completedLessons[lessonKey];
            lessonButtonsHtml += `
              <button onclick="app.startLesson('${sub.id}', ${i})" class="lesson-btn flex flex-col items-center justify-center w-[70px] h-[70px] rounded-2xl border-2 ${isDone ? 'bg-emerald-50 border-emerald-400 text-emerald-600' : 'bg-white border-slate-200 text-slate-500 hover:border-amber-300 hover:bg-amber-50'} flex-shrink-0 shadow-sm relative">
                <span class="font-bold text-xs uppercase mb-1">Bài</span>
                <span class="font-extrabold text-xl leading-none">${i}</span>
                ${isDone ? '<span class="absolute -top-2 -right-2 text-sm">⭐</span>' : ''}
              </button>
            `;
          }

          list.innerHTML += `
            <div class="bg-white rounded-3xl p-4 shadow-sm border border-slate-100">
              <h4 class="font-extrabold text-slate-700 mb-3 text-lg border-l-4 border-amber-400 pl-3">${sub.name}</h4>
              <div class="flex gap-3 overflow-x-auto pb-2 pr-4 snap-x">
                ${lessonButtonsHtml}
              </div>
            </div>
          `;
        });

        this.hideAll();
        document.getElementById('view-subcategories').classList.remove('hidden-view');
      },

      backToSubcategories() {
        this.hideAll();
        document.getElementById('view-subcategories').classList.remove('hidden-view');
        // Re-render để hiện sao nếu vừa chơi xong
        this.openCategory(this.currentCatId); 
      },

      // --- LOGIC TRÒ CHƠI & XÁO TRỘN DỮ LIỆU ---
      startLesson(subId, lessonNumber) {
        // Tìm thông tin chủ đề
        let subConfig = null;
        this.db.categories.forEach(cat => {
          const found = cat.subcategories.find(s => s.id === subId);
          if(found) subConfig = found;
        });

        // 1. Quét kho dữ liệu lấy các câu hỏi thuộc skill này
        const questionPool = this.db.questions.filter(q => q.skill === subConfig.skill);
        
        // CƠ CHẾ BỌC LỖI: Nếu dữ liệu trống
        if(questionPool.length === 0) {
          alert("Kho dữ liệu đang cập nhật bài tập cho chủ đề này. Bé chọn bài khác nhé!");
          return;
        }

        // 2. THUẬT TOÁN XÁO TRỘN NGẪU NHIÊN (Shuffle Array)
        const shuffledPool = [...questionPool].sort(() => Math.random() - 0.5);
        
        // Lấy tối đa 10 câu (Nếu kho có ít hơn thì lấy tất cả)
        this.currentQuestions = shuffledPool.slice(0, 10);
        
        // Thiết lập biến
        this.currentSubConfig = subConfig;
        this.currentLessonNumber = lessonNumber;
        this.currentIndex = 0;

        document.getElementById('game-prompt').innerText = subConfig.prompt || 'Chọn đáp án đúng';
        
        this.hideAll();
        document.getElementById('view-game').classList.remove('hidden-view');
        this.updateGameUI();
      },

      updateGameUI() {
        const item = this.currentQuestions[this.currentIndex];
        document.getElementById('current-word').innerText = item.word;
        
        document.getElementById('btn-left-text').innerText = item.btnLeft || this.currentSubConfig.btnLeft || 'TRÁI';
        document.getElementById('btn-right-text').innerText = item.btnRight || this.currentSubConfig.btnRight || 'PHẢI';

        const percent = ((this.currentIndex) / this.currentQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-text').innerText = `${this.currentIndex + 1}/${this.currentQuestions.length}`;
        
        const card = document.getElementById('word-card');
        card.classList.remove('animate-pop');
        void card.offsetWidth; 
        card.classList.add('animate-pop');
        
        setTimeout(() => this.readWord(item.word), 300);
      },

      checkAnswer(userChoice) {
        const item = this.currentQuestions[this.currentIndex];
        
        if (userChoice === item.correct) {
          AudioEngine.playCorrect();
          this.currentIndex++;
          
          if (this.currentIndex < this.currentQuestions.length) {
            this.updateGameUI();
          } else {
            // Lưu trạng thái hoàn thành Bài
            const lessonKey = `${this.currentSubConfig.id}_bai${this.currentLessonNumber}`;
            // Chỉ cộng điểm nếu là lần đầu hoàn thành bài này
            if(!this.stats.completedLessons[lessonKey]) {
               this.stats.score += 50;
            }
            this.stats.completedLessons[lessonKey] = true;
            this.saveStats();
            
            // Hiện kết quả
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            this.currentQuestions.forEach(q => {
              list.innerHTML += `<li class="mb-2"><b>- ${q.word}</b>: ${q.desc}</li>`;
            });
            
            this.hideAll();
            document.getElementById('view-result').classList.remove('hidden-view');
            AudioEngine.playCorrect();
          }
        } else {
          AudioEngine.playWrong();
          
          // Ghi nhận lỗi cho AI Đánh giá
          const skill = this.currentSubConfig.skill;
          if(!this.stats.errorLog[skill]) this.stats.errorLog[skill] = 0;
          this.stats.errorLog[skill]++;
          this.saveStats();

          const card = document.getElementById('word-card');
          card.classList.remove('animate-pop');
          void card.offsetWidth; 
          card.classList.add('animate-shake', 'border-red-400');
          setTimeout(() => card.classList.remove('animate-shake', 'border-red-400'), 300);
        }
      },

      readWord(wordText) {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(wordText);
          utterance.lang = 'vi-VN';
          window.speechSynthesis.speak(utterance);
        }
      },

      // --- HỆ THỐNG ĐÁNH GIÁ (AI HỒ SƠ BE) ---
      showEvaluation() {
        const evalBox = document.getElementById('eval-content');
        evalBox.innerHTML = '';
        
        let hasErrors = false;
        
        for (let skill in this.stats.errorLog) {
          const errCount = this.stats.errorLog[skill];
          if (errCount > 2) {
            hasErrors = true;
            const recText = this.db.recommendations[skill] || "Bé cần luyện tập thêm phần này nhé.";
            evalBox.innerHTML += `
              <div class="bg-white p-3 rounded-lg border-l-4 border-orange-400 shadow-sm">
                <span class="font-bold text-orange-600">⚠️ Chủ đề cần ôn lại</span>
                <p class="mt-1">${recText}</p>
                <p class="text-xs text-slate-400 mt-1 font-bold">Số lần làm sai: ${errCount}</p>
              </div>
            `;
          }
        }

        if(!hasErrors) {
          evalBox.innerHTML = `
            <div class="flex flex-col items-center justify-center h-full text-center">
              <span class="text-4xl mb-2">🌟</span>
              <p class="font-bold text-emerald-600 mt-2">Tuyệt vời! Hệ thống chưa phát hiện lỗ hổng kiến thức nào của bé. Tiếp tục học nhé!</p>
            </div>
          `;
        }

        document.getElementById('modal-eval').classList.remove('hidden-view');
      }
    };

    app.init();
  </script>
</body>
</html>
